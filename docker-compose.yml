version: '3.8'

services:
  api:
    build:
      context: ./src/Backend/ArzSw.FhirProfileComparer.Api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
